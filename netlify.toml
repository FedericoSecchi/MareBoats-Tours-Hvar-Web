[build]
  command = "npm run build"
  publish = "out"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  NETLIFY_NEXT_PLUGIN_SKIP = "true"
  CUSTOM_DOMAIN = "mareboatshvar.com"

# Redirect www to root and enforce HTTPS
[[redirects]]
  from = "https://www.mareboatshvar.com/*"
  to = "https://mareboatshvar.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.mareboatshvar.com/*"
  to = "https://mareboatshvar.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://mareboatshvar.com/*"
  to = "https://mareboatshvar.com/:splat"
  status = 301
  force = true
