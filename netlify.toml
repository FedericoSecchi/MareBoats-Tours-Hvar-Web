[build]
  command = "npm run build"
  publish = "out"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  NETLIFY_NEXT_PLUGIN_SKIP = "true"
  CUSTOM_DOMAIN = "mareboatshvar.com"

# Redirect www to root and enforce HTTPS
[[redirects]]
  from = "https://www.mareboatshvar.com/*"
  to = "https://mareboatshvar.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.mareboatshvar.com/*"
  to = "https://mareboatshvar.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://mareboatshvar.com/*"
  to = "https://mareboatshvar.com/:splat"
  status = 301
  force = true

# Legacy URLs — GSC cleanup
[[redirects]]
  from = "/about.html"
  to = "/about/"
  status = 301

[[redirects]]
  from = "/destination"
  to = "/"
  status = 301

[[redirects]]
  from = "/service.html"
  to = "/tours/"
  status = 301

[[redirects]]
  from = "/private-boat-tour-hvar"
  to = "/tours/private-boat-charter/"
  status = 301

[[redirects]]
  from = "/blue-cave-tour-hvar"
  to = "/tours/blue-cave-pakleni-islands/"
  status = 301

[[redirects]]
  from = "/case-studies"
  to = "/"
  status = 301

[[redirects]]
  from = "/service"
  to = "/tours/"
  status = 301

[[redirects]]
  from = "/package"
  to = "/tours/"
  status = 301

[[redirects]]
  from = "/boat-tour-pakleni-islands"
  to = "/tours/blue-cave-pakleni-islands/"
  status = 301
